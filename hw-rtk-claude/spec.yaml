schemaVersion: "1"
kind: mixin
name: hw-rtk-claude
displayName: HW RTK Claude
description: Install RTK and register a Claude Code Bash rewrite hook
extends: claude

network:
  allowedDomains:
    - "raw.githubusercontent.com:443"
    - "github.com:443"
    - "api.github.com:443"
    - "release-assets.githubusercontent.com:443"

commands:
  install:
    - command: "apt-get update && apt-get install -y --no-install-recommends jq curl ca-certificates && rm -rf /var/lib/apt/lists/*"
      user: "0"
      description: Install RTK hook dependencies
    - command: "curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh | env RTK_INSTALL_DIR=/usr/local/bin sh && /usr/local/bin/rtk --version && /usr/local/bin/rtk gain >/dev/null"
      user: "0"
      description: Install RTK token optimizer
    - command: "chmod +x /usr/local/bin/rtk-rewrite-claude.sh"
      user: "0"
      description: Make RTK Claude Code rewrite hook executable
    - command: "chmod +x /usr/local/bin/register-rtk-claude-hook.sh && /usr/local/bin/register-rtk-claude-hook.sh"
      user: "0"
      description: Register RTK Claude Code managed hook
