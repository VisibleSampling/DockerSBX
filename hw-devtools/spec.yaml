schemaVersion: "1"
kind: mixin
name: hw-devtools
displayName: HW Dev Tools
description: Install Ansible, and build tooling
extends: claude

network:
  allowedDomains:
    - "astral.sh:443"
    - "github.com:443"
    - "release-assets.githubusercontent.com:443"

commands:
  install:
    - command: "apt-get update && apt-get install -y --no-install-recommends ansible ansible-lint python3-pip build-essential && rm -rf /var/lib/apt/lists/*"
      user: "0"
      description: Install dev tooling



