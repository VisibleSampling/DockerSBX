schemaVersion: "1"
kind: agent
name: skitzodex
displayName: SkitzoDex
description: Honkinwaffles SkitzoDex - Keeping Codex in a sandbox

agent:
  image: "docker/sandbox-templates:codex"
  persistence: persistent
  aiFilename: CLAUDE.md
  entrypoint:
    run: [codex]

network:
  serviceDomains:
    api.openai.com: openai
  serviceAuth:
    openai:
      headerName: Authorization
      valueFormat: "Bearer %s"
  allowedDomains:
    - "auth.openai.com:443"
    - "chatgpt.com:443"
    - "codex.openai.com:443"
    - "openai.com:443"
    - "platform.openai.com:443"

environment:
  variables:
    IS_SANDBOX: "1"

commands:
  install:
    - command: "apt-get update && apt-get install -y --no-install-recommends jq && rm -rf /var/lib/apt/lists/*"
      user: "0"
      description: Install jq
    - command: "chmod +x /usr/local/lib/skitzodex/gitignore-guard.sh"
      user: "0"
      description: Make Codex gitignore guard hook executable
