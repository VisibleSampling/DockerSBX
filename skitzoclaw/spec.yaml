schemaVersion: "1"
kind: agent
name: skitzoclaw
displayName: SkitzoClaw
description: Honkinwaffles SkitzoClaw - Keeping Claude in a sandbox

agent:
  image: "docker/sandbox-templates:claude-code-docker"
  aiFilename: CLAUDE.md
  persistence: persistent
  entrypoint:
    run: [claude , --permission-mode, plan]

network:
  serviceDomains:
    api.anthropic.com: anthropic
    console.anthropic.com: anthropic
    claude.ai: anthropic
  serviceAuth:
    anthropic:
      headerName: x-api-key
      valueFormat: "%s"
  allowedDomains:
    - "downloads.claude.ai:443"
    - "claude.com:443"

environment:
  variables:
    IS_SANDBOX: "1"

commands:
  install:
    - command: "apt-get update && apt-get install -y --no-install-recommends ansible ansible-lint python3-pip build-essential vim jq && rm -rf /var/lib/apt/lists/*"
      user: "0"
      description: Install Ansible and build tooling
    - command: "curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/usr/local/bin sh"
      user: "0"
      description: Install uv
    - command: "echo '' | base64 -d > /usr/local/bin/gitignore-guard.sh && chmod +x /usr/local/bin/gitignore-guard.sh"
      user: "0"
      description: Install gitignore guard hook script
    - command: "mkdir -p /etc/claude-code && echo '' | base64 -d > /etc/claude-code/managed-settings.json && chmod 0644 /etc/claude-code/managed-settings.json"
      user: "0"
      description: Write managed settings with gitignore hook
