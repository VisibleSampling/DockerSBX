schemaVersion: "1"
kind: agent
name: skitzoclaw
displayName: SkitzoClaw
description: Honkinwaffles SkitzoClaw - Keeping Claude in a sandbox

agent:
  image: "docker/sandbox-templates:claude-code-docker"
  aiFilename: CLAUDE.md
  persistence: persistent
  entrypoint:
    run: [claude, --permission-mode, plan]

network:
  serviceDomains:
    api.anthropic.com: anthropic
  serviceAuth:
    anthropic:
      headerName: x-api-key
      valueFormat: "%s"
  allowedDomains:
    - "downloads.claude.ai:443"
    - "claude.com:443"
    - "claude.ai:443"
    - "console.anthropic.com:443"

environment:
  variables:
    IS_SANDBOX: "1"
    ANTHROPIC_MODEL: "claude-haiku-4-5-20251001"

commands:
  install:
    - command: "apt-get update && apt-get install -y --no-install-recommends jq && rm -rf /var/lib/apt/lists/*"
      user: "0"
      description: Install jq
    - command: |
        cat << 'SCRIPT' > /usr/local/bin/gitignore-guard.sh
        #!/bin/bash
        INPUT=$(cat)

        is_exempt() {
          case "$1" in
            */.claude/*|.claude/*|*/.mcp.json|.mcp.json) return 0 ;;
          esac
          return 1
        }

        is_ignored() {
          git check-ignore -q -- "$1" 2>/dev/null
        }

        deny() {
          local reason="$1"
          jq -n --arg reason "$reason" '{
            "hookSpecificOutput": {
              "hookEventName": "PreToolUse",
              "permissionDecision": "deny",
              "permissionDecisionReason": $reason
            }
          }'
          exit 0
        }

        deny_if_ignored() {
          local path="$1"
          [ -n "$path" ] || return 0
          is_exempt "$path" && return 0
          if is_ignored "$path"; then
            deny "Access denied: $path is listed in .gitignore"
          fi
        }

        # Read/Edit/Write: check file_path directly
        FILE_PATH=$(echo "$INPUT" | jq -r '.tool_input.file_path // empty')
        if [ -n "$FILE_PATH" ]; then
          deny_if_ignored "$FILE_PATH"
        fi

        # Bash: scan command tokens for gitignored paths
        COMMAND=$(echo "$INPUT" | jq -r '.tool_input.command // empty')
        if [ -n "$COMMAND" ]; then
          for token in $COMMAND; do
            token="${token#\"}"
            token="${token%\"}"
            token="${token#\'}"
            token="${token%\'}"
            [[ "$token" == -* ]] && continue
            [[ ${#token} -lt 2 ]] && continue
            deny_if_ignored "$token"
          done
        fi

        exit 0
        SCRIPT
        chmod +x /usr/local/bin/gitignore-guard.sh
      user: "0"
      description: Install gitignore guard hook script
    - command: |
        mkdir -p /etc/claude-code
        cat << 'JSON' > /etc/claude-code/managed-settings.json
        {
          "includeCoAuthoredBy": false,
          "allowManagedHooksOnly": true,
          "hooks": {
            "PreToolUse": [
              {
                "matcher": "Read|Edit|Write|Bash",
                "hooks": [{ "type": "command", "command": "/usr/local/bin/gitignore-guard.sh" }]
              }
            ]
          }
        }
        JSON
        chmod 0644 /etc/claude-code/managed-settings.json
      user: "0"
      description: Write managed settings with gitignore hook
